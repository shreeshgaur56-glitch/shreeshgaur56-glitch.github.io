<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FRI Campus Tree Field Guide</title>

  <!-- Leaflet CSS (no integrity, no crossorigin to avoid blocking) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Our stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>FRI Campus Tree Field Guide</h1>
    <p>Explore tree species across Forest Research Institute, Dehradun.</p>
  </header>

  <main>
    <section id="map-section">
      <h2>Campus Map</h2>
      <!-- This div ID must match script.js (L.map('map')) -->
      <div id="map"></div>
    </section>

    <section id="list-section">
      <h2>Tree Species List</h2>
      <p>Data loaded directly from Airtable.</p>
      <!-- This UL ID must match script.js (document.getElementById('tree-list')) -->
      <ul id="tree-list"></ul>
    </section>
  </main>

  <footer>
    <p>Powered by Airtable &amp; Leaflet &bull; Hosted on GitHub Pages</p>
  </footer>

  <!-- Leaflet JS (no integrity, no crossorigin) -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

  <!-- Our script -->
  <script src="script.js"></script>
</body>
</html>
