<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FRI Campus Tree Field Guide</title>

  <!-- Leaflet CSS (map library) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-o9N1j7kGStGkLz2p3bZkG6qJbPeLr3yLx3lNfQx3A+o="
    crossorigin=""
  />

  <!-- Our stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>FRI Campus Tree Field Guide</h1>
    <p>Explore tree species across Forest Research Institute, Dehradun.</p>
  </header>

  <main>
    <section id="map-section">
      <h2>Campus Map</h2>
      <div id="map"></div>
    </section>

    <section id="list-section">
      <h2>Tree Species List</h2>
      <p>Data loaded directly from Airtable.</p>
      <ul id="tree-list"></ul>
    </section>
  </main>

  <footer>
    <p>Powered by Airtable & Leaflet • Hosted on GitHub Pages</p>
  </footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-o9mYHqO+1lLRsC1sZkI3uj1+f4W0jCw9n9m1Jdhp3Wc="
    crossorigin=""
  ></script>

  <!-- Our script -->
  <script src="script.js"></script>
</body>
</html>
